# =============================================================================
# .github/workflows/ml-pipeline.yml
# GitHub Actions CI/CD Pipeline cho ML
# Tự động chạy khi push code hoặc tạo Pull Request
#
# Workflow gồm 3 jobs chạy tuần tự:
#   1. test   -> Lint + Unit tests
#   2. train  -> Train model + Quality gate tests
#   3. deploy -> Deploy (chỉ khi merge vào main)
# =============================================================================

name: ML CI/CD Pipeline

# Trigger khi nào pipeline chạy
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ===========================================================
  # JOB 1: Lint và Unit Tests cơ bản
  # ===========================================================
  test:
    name: Lint and Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"  # Cache pip để tăng tốc

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r Lab3_CICD/requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          cd Lab3_CICD
          flake8 train.py deploy.py --max-line-length=120 --count --statistics

  # ===========================================================
  # JOB 2: Train Model + Quality Gate
  # Chỉ chạy khi Job 1 pass
  # ===========================================================
  train-and-test:
    name: Train Model and Quality Gate
    runs-on: ubuntu-latest
    needs: test  # Phụ thuộc vào job 'test'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r Lab3_CICD/requirements.txt

      - name: Train ML model
        run: |
          cd Lab3_CICD
          python train.py

      - name: Run model quality tests
        run: |
          cd Lab3_CICD
          pytest test_model.py -v \
            --tb=short \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()  # Luôn upload dù pass hay fail
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: Lab3_CICD/test-results.xml

      - name: Upload model artifacts
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: trained-model
          path: |
            Lab3_CICD/models/
            Lab3_CICD/metrics/

  # ===========================================================
  # JOB 3: Deploy (chỉ khi merge vào main)
  # ===========================================================
  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: train-and-test  # Chỉ chạy khi train pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Download model artifacts
        uses: actions/download-artifact@v3
        with:
          name: trained-model
          path: Lab3_CICD/

      - name: Install dependencies
        run: pip install -r Lab3_CICD/requirements.txt

      - name: Deploy model
        run: |
          cd Lab3_CICD
          python deploy.py deploy

      - name: Smoke test
        run: |
          cd Lab3_CICD
          python -c "
          import joblib, numpy as np, os, json
          with open('deployments/current.json') as f:
              current = json.load(f)['current_deploy']
          model = joblib.load(f'deployments/{current}/model.pkl')
          pred = model.predict(np.zeros((1, 8)))
          print('Smoke test OK! Prediction:', pred[0])
          "

      - name: Notify on failure (rollback)
        if: failure()
        run: |
          cd Lab3_CICD
          echo "Deploy failed! Rolling back..."
          python deploy.py rollback || true
